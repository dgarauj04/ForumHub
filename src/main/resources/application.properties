spring.application.name=forumhub
spring.datasource.url=jdbc:postgresql://localhost/forumhub
spring.datasource.username=postgres
spring.datasource.password=deges
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

api.security.token.secret=${JWT_SECRET:forumhub-secret-key}
api.security.token.expiration=7200000